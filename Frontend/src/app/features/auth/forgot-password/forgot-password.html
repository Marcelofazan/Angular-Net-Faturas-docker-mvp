<div class="auth-layout">
  <div class="auth-card">
    <div class="auth-card__brand cluster" style="justify-content: space-between">
      <span>Invoice.API</span>
      <app-language-switcher />
    </div>
    <h1>{{ 'auth.forgotPassword.title' | translate }}</h1>
    <p class="text-muted">{{ 'auth.forgotPassword.subtitle' | translate }}</p>

    <form class="stack" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label class="field__label" for="email">{{ 'common.fields.email' | translate }}</label>
        <input id="email" class="input" type="email" formControlName="email" autocomplete="email" />
      </div>

      @if (errorMessage()) {
        <div class="field__error">{{ errorMessage() }}</div>
      }

      <button type="submit" class="btn btn--accent btn--block" [disabled]="submitting()">
        {{ (submitting() ? 'auth.forgotPassword.submitting' : 'auth.forgotPassword.submit') | translate }}
      </button>
    </form>

    <div class="auth-card__footer">
      <a routerLink="/login">{{ 'auth.forgotPassword.footer.backToLogin' | translate }}</a>
    </div>
  </div>
</div>
