<div class="auth-layout">
  <div class="auth-card" style="max-width: 32rem">
    <div class="auth-card__brand cluster" style="justify-content: space-between">
      <span>Invoice.API</span>
      <app-language-switcher />
    </div>
    <h1>{{ 'auth.register.title' | translate }}</h1>
    <p class="text-muted">{{ 'auth.register.subtitle' | translate }}</p>

    <form class="stack" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-grid">
        <div class="field">
          <label class="field__label" for="firstName">{{ 'auth.register.fields.firstName' | translate }}</label>
          <input id="firstName" class="input" type="text" formControlName="firstName" autocomplete="given-name" />
        </div>
        <div class="field">
          <label class="field__label" for="lastName">{{ 'auth.register.fields.lastName' | translate }}</label>
          <input id="lastName" class="input" type="text" formControlName="lastName" autocomplete="family-name" />
        </div>
      </div>

      <div class="form-grid">
        <div class="field">
          <label class="field__label" for="username">{{ 'auth.register.fields.username' | translate }}</label>
          <input id="username" class="input" type="text" formControlName="username" autocomplete="username" />
        </div>
        <div class="field">
          <label class="field__label" for="email">{{ 'common.fields.email' | translate }}</label>
          <input id="email" class="input" type="email" formControlName="email" autocomplete="email" />
        </div>
      </div>

      <div class="form-grid">
        <div class="field">
          <label class="field__label" for="address">{{ 'auth.register.fields.address' | translate }}</label>
          <input id="address" class="input" type="text" formControlName="address" autocomplete="street-address" />
        </div>
        <div class="field">
          <label class="field__label" for="phoneNumber">{{ 'auth.register.fields.phoneNumber' | translate }}</label>
          <input id="phoneNumber" class="input" type="tel" formControlName="phoneNumber" autocomplete="tel" />
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="password">{{ 'auth.register.fields.password' | translate }}</label>
        <app-password-input id="password" formControlName="password" autocomplete="new-password" />
        <span class="field__hint">{{ 'auth.register.passwordHint' | translate }}</span>
      </div>

      @if (errorMessage()) {
        <div class="field__error">{{ errorMessage() }}</div>
      }

      <button type="submit" class="btn btn--accent btn--block" [disabled]="submitting()">
        {{ (submitting() ? 'auth.register.submitting' : 'auth.register.submit') | translate }}
      </button>
    </form>

    <div class="auth-card__footer">
      {{ 'auth.register.footer.haveAccount' | translate }} <a routerLink="/login">{{ 'auth.register.footer.login' | translate }}</a>
    </div>
  </div>
</div>
