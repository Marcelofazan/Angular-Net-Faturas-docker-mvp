<div class="shell" [class.shell--sidebar-collapsed]="!sidebarOpen()">
  <div class="sidebar-backdrop" (click)="toggleSidebar()"></div>

  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__brand-mark">I</span>
      <span>Invoice Management</span>
    </div>

    <nav class="sidebar__nav">
      @for (item of navItems; track item.path) {
        <a
          class="sidebar__link"
          [routerLink]="item.path"
          routerLinkActive="is-active"
        >
          {{ item.labelKey | translate }}
        </a>
      }
    </nav>

    <div class="sidebar__footer">
      <button type="button" class="btn btn--ghost btn--block" (click)="logout()">{{ 'shell.logout.button' | translate }}</button>
    </div>
  </aside>

  <div class="shell__main">
    <header class="topbar">
      <div class="cluster">
        <button
          type="button"
          class="btn btn--ghost btn--icon sidebar-toggle"
          [attr.aria-label]="sidebarToggleLabel"
          [attr.title]="sidebarToggleLabel"
          (click)="toggleSidebar()"
        >
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="2" />
            <path d="M9 4v16" />
          </svg>
        </button>
      </div>
      <div class="cluster">
        <app-theme-toggle />
        <app-language-switcher />
        <div class="topbar__user">{{ claims().email ?? 'Аккаунт' }}</div>
      </div>
    </header>

    <main class="shell__content">
      <router-outlet />
    </main>
  </div>
</div>
